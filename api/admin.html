<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>投票管理｜底辺AI音楽フェス</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--fg:#e8e8e8;--sub:#777;--m:#444;--r:#e94560;--g:#2ecc71;--y:#f0c040;--dark:#0a0a0a;--mono:'Courier New',Consolas,monospace;--head:'Noto Sans JP',sans-serif;--body:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:var(--body);line-height:1.7;min-height:100vh}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:var(--dark);border:1px solid #1a1a1a;border-radius:12px;padding:2.5rem;width:100%;max-width:360px;text-align:center}
.login-box h1{font-family:var(--head);font-size:1rem;font-weight:900;color:var(--r);letter-spacing:.1em;margin-bottom:.3rem}
.login-box p{font-size:.75rem;color:var(--sub);margin-bottom:1.5rem}
.login-input{width:100%;background:#111;border:1px solid #222;border-radius:6px;padding:.7rem 1rem;font-family:var(--mono);font-size:.85rem;color:var(--fg);outline:none;text-align:center;letter-spacing:.15em;margin-bottom:1rem}
.login-input:focus{border-color:var(--r)}
.login-btn{width:100%;background:var(--r);color:#fff;border:none;border-radius:6px;padding:.7rem;font-family:var(--head);font-size:.85rem;font-weight:700;cursor:pointer;letter-spacing:.08em;transition:opacity .3s}
.login-btn:hover{opacity:.85}
.login-err{color:var(--r);font-size:.75rem;margin-top:.8rem;display:none}

/* ── Main ── */
.app{display:none;max-width:1100px;margin:0 auto;padding:1.5rem clamp(1rem,3vw,2rem)}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #1a1a1a}
.hdr h1{font-family:var(--head);font-size:1.1rem;font-weight:900;letter-spacing:.05em}
.hdr h1 span{color:var(--r)}
.hdr-actions{display:flex;gap:.5rem}
.btn{font-family:var(--head);font-size:.7rem;font-weight:700;padding:.45rem .9rem;border-radius:5px;cursor:pointer;border:1px solid #222;background:#111;color:var(--fg);transition:all .3s;letter-spacing:.04em}
.btn:hover{border-color:var(--r);color:var(--r)}
.btn-r{background:rgba(233,69,96,.15);border-color:rgba(233,69,96,.3);color:var(--r)}
.btn-r:hover{background:rgba(233,69,96,.3)}
.btn-g{background:rgba(46,204,113,.12);border-color:rgba(46,204,113,.25);color:var(--g)}
.btn-g:hover{background:rgba(46,204,113,.25)}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem;margin-bottom:1.5rem}
.stat-card{background:var(--dark);border:1px solid #1a1a1a;border-radius:8px;padding:1rem;text-align:center}
.stat-val{font-family:var(--mono);font-size:1.6rem;font-weight:900;color:var(--fg)}
.stat-val.red{color:var(--r)}
.stat-label{font-family:var(--mono);font-size:.55rem;color:var(--sub);letter-spacing:.1em;margin-top:.2rem}

/* ── Tabs ── */
.tabs{display:flex;gap:.3rem;margin-bottom:1.2rem;border-bottom:1px solid #1a1a1a;padding-bottom:.8rem;flex-wrap:wrap}
.tab{font-family:var(--head);font-size:.75rem;font-weight:700;color:var(--sub);background:none;border:1px solid transparent;border-radius:5px;padding:.4rem 1rem;cursor:pointer;transition:all .3s}
.tab:hover{color:var(--fg)}
.tab.active{color:var(--r);border-color:rgba(233,69,96,.3);background:rgba(233,69,96,.06)}

/* ── Panels ── */
.panel{display:none}
.panel.active{display:block}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{font-family:var(--mono);font-size:.6rem;color:var(--sub);letter-spacing:.1em;text-align:left;padding:.6rem .8rem;border-bottom:1px solid #1a1a1a;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--r)}
th.sorted{color:var(--r)}
td{padding:.5rem .8rem;border-bottom:1px solid #0d0d0d;font-family:var(--mono);font-size:.8rem}
tr:hover td{background:rgba(233,69,96,.03)}
.bar{height:6px;background:var(--r);border-radius:3px;min-width:2px;transition:width .3s}
.bar-wrap{width:100%;background:#111;border-radius:3px;overflow:hidden}

/* ── Boost ── */
.boost-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.6rem;margin-bottom:1rem}
.boost-item{background:var(--dark);border:1px solid #1a1a1a;border-radius:6px;padding:.6rem .8rem;display:flex;align-items:center;gap:.5rem}
.boost-no{font-family:var(--mono);font-size:.75rem;color:var(--sub);min-width:3rem}
.boost-name{font-family:var(--head);font-size:.75rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.boost-input{width:50px;background:#111;border:1px solid #222;border-radius:4px;padding:.3rem .4rem;font-family:var(--mono);font-size:.75rem;color:var(--fg);text-align:center;outline:none}
.boost-input:focus{border-color:var(--r)}
.boost-input.has-val{border-color:rgba(233,69,96,.4);background:rgba(233,69,96,.08);color:var(--r)}
.boost-actions{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.boost-search{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:.5rem .8rem;font-size:.8rem;color:var(--fg);outline:none;min-width:180px}
.boost-search:focus{border-color:var(--r)}

/* ── Debug ── */
.debug-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.8rem;flex-wrap:wrap}
.debug-input{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:.5rem .8rem;font-family:var(--mono);font-size:.85rem;color:var(--fg);outline:none;width:80px;text-align:center}
.debug-input:focus{border-color:var(--r)}
.debug-log{background:var(--dark);border:1px solid #1a1a1a;border-radius:6px;padding:1rem;font-family:var(--mono);font-size:.7rem;color:var(--sub);max-height:300px;overflow-y:auto;white-space:pre-wrap;line-height:1.8}
.debug-log .ok{color:var(--g)}
.debug-log .err{color:var(--r)}

/* ── Toast ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--r);color:#fff;font-family:var(--head);font-size:.8rem;font-weight:700;padding:.7rem 1.5rem;border-radius:8px;z-index:999;opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Danger Zone ── */
.danger{background:rgba(233,69,96,.04);border:1px solid rgba(233,69,96,.15);border-radius:8px;padding:1.2rem;margin-top:1.5rem}
.danger h3{font-family:var(--head);font-size:.8rem;color:var(--r);margin-bottom:.8rem}
.danger-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;flex-wrap:wrap}
.danger-row span{font-size:.7rem;color:var(--sub)}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>🔒 ADMIN</h1>
    <p>底辺AI音楽フェス 投票管理</p>
    <input type="password" id="passInput" class="login-input" placeholder="パスワード" autofocus>
    <button class="login-btn" onclick="tryLogin()">ログイン</button>
    <div class="login-err" id="loginErr">パスワードが違います</div>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="hdr">
    <h1><span>底辺</span>投票管理</h1>
    <div class="hdr-actions">
      <button class="btn" onclick="refreshAll()">🔄 更新</button>
      <button class="btn" onclick="downloadCSV()">📊 CSV</button>
      <button class="btn" onclick="logout()">🚪 ログアウト</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab active" onclick="showPanel('ranking',this)">📊 ランキング</button>
    <button class="tab" onclick="showPanel('boost',this)">🎛️ ゲタ設定</button>
    <button class="tab" onclick="showPanel('debug',this)">🧪 デバッグ投票</button>
    <button class="tab" onclick="showPanel('danger',this)">⚠️ リセット</button>
  </div>

  <!-- Ranking -->
  <div class="panel active" id="panel-ranking">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable('no')" id="th-no" class="sorted">No.</th>
            <th onclick="sortTable('name')">アーティスト</th>
            <th onclick="sortTable('total')" id="th-total">合計</th>
            <th onclick="sortTable('real')" id="th-real">実票</th>
            <th onclick="sortTable('boost')" id="th-boost">ゲタ</th>
            <th style="min-width:120px"></th>
          </tr>
        </thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Boost -->
  <div class="panel" id="panel-boost">
    <div class="boost-actions">
      <input type="text" class="boost-search" id="boostSearch" placeholder="🔍 アーティスト検索...">
      <button class="btn btn-g" onclick="saveAllBoosts()">💾 ゲタ一括保存</button>
      <span style="font-size:.65rem;color:var(--sub)">数値を入力して一括保存。0で解除。</span>
    </div>
    <div class="boost-grid" id="boostGrid"></div>
  </div>

  <!-- Debug -->
  <div class="panel" id="panel-debug">
    <p style="font-size:.75rem;color:var(--sub);margin-bottom:1rem">重複チェックなしでテスト投票。何回でも押せます。</p>
    <div class="debug-row">
      <span style="font-size:.75rem;color:var(--sub)">No.</span>
      <input type="text" class="debug-input" id="debugArtist" placeholder="001" maxlength="3">
      <button class="btn btn-r" onclick="debugVote()">🔥 投票</button>
      <button class="btn" onclick="debugVote10()">×10連打</button>
    </div>
    <div class="debug-log" id="debugLog">デバッグログ...\n</div>
  </div>

  <!-- Danger -->
  <div class="panel" id="panel-danger">
    <div class="danger">
      <h3>⚠️ DANGER ZONE</h3>
      <div class="danger-row">
        <button class="btn btn-r" onclick="resetVotes()">🗑️ 実票リセット</button>
        <span>ゲタは残ります</span>
      </div>
      <div class="danger-row">
        <button class="btn btn-r" onclick="resetAll()">💣 全リセット（実票+ゲタ）</button>
        <span>全てゼロに戻します</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = '/api/vote.php';
var PASS = '';
var adminData = null;
var artistList = null; // artists.htmlから取得
var currentSort = {key:'no', asc:true};

/* ── Artist list (artists.htmlと同期) ── */
function getArtistName(no) {
  if (!artistList) return 'No.' + no;
  var a = artistList.find(function(x){ return x.no === no; });
  return a ? a.name : 'No.' + no;
}

/* ── Login ── */
document.getElementById('passInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') tryLogin();
});

function tryLogin() {
  PASS = document.getElementById('passInput').value;
  apiGet('admin=1&pass=' + PASS, function(data) {
    if (data.error) {
      document.getElementById('loginErr').style.display = 'block';
      return;
    }
    adminData = data;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadArtistList();
    renderAll();
  });
}

function logout() {
  PASS = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('passInput').value = '';
}

/* ── API helper ── */
function apiGet(params, cb) {
  fetch(API + '?' + params + '&_=' + Date.now(), {credentials:'same-origin'})
    .then(function(r){ return r.json(); })
    .then(cb)
    .catch(function(e){ toast('通信エラー: ' + e.message); });
}

/* ── Load artist names from artists.html ── */
function loadArtistList() {
  fetch('/artists.html?_=' + Date.now())
    .then(function(r){ return r.text(); })
    .then(function(html){
      var m = html.match(/var\s+artists\s*=\s*\[([\s\S]*?)\];/);
      if (!m) return;
      try {
        artistList = eval('[' + m[1] + ']');
      } catch(e) { artistList = null; }
      renderAll();
    })
    .catch(function(){});
}

/* ── Refresh ── */
function refreshAll() {
  apiGet('admin=1&pass=' + PASS, function(data) {
    if (data.error) { toast('エラー: ' + data.error); return; }
    adminData = data;
    renderAll();
    toast('✅ 更新しました');
  });
}

/* ── Render ── */
function renderAll() {
  if (!adminData) return;
  renderStats();
  renderRanking();
  renderBoostGrid();
}

function renderStats() {
  var d = adminData;
  var totalPublic = 0;
  for (var k in d.by_artist) totalPublic += d.by_artist[k];
  var boostTotal = 0;
  for (var k in d.boosts) boostTotal += d.boosts[k];
  var artistCount = Object.keys(d.by_artist).length;

  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-val red">' + totalPublic + '</div><div class="stat-label">合計票数（公開）</div></div>' +
    '<div class="stat-card"><div class="stat-val">' + d.total_real_votes + '</div><div class="stat-label">実票数</div></div>' +
    '<div class="stat-card"><div class="stat-val">' + boostTotal + '</div><div class="stat-label">ゲタ合計</div></div>' +
    '<div class="stat-card"><div class="stat-val">' + d.unique_voters + '</div><div class="stat-label">ユニーク投票者</div></div>' +
    '<div class="stat-card"><div class="stat-val">' + artistCount + '</div><div class="stat-label">得票アーティスト</div></div>';
}

function renderRanking() {
  var d = adminData;
  // 全アーティストNo.を集める
  var allNos = {};
  for (var k in d.by_artist) allNos[k] = true;
  for (var k in d.raw_counts) allNos[k] = true;
  for (var k in d.boosts) allNos[k] = true;

  var rows = [];
  for (var no in allNos) {
    rows.push({
      no: no,
      name: getArtistName(no),
      total: d.by_artist[no] || 0,
      real: d.raw_counts[no] || 0,
      boost: d.boosts[no] || 0
    });
  }

  // Sort
  var key = currentSort.key, asc = currentSort.asc;
  rows.sort(function(a, b) {
    var va = key === 'name' ? a.name : (key === 'no' ? a.no : a[key]);
    var vb = key === 'name' ? b.name : (key === 'no' ? b.no : b[key]);
    if (typeof va === 'string') return asc ? va.localeCompare(vb, 'ja') : vb.localeCompare(va, 'ja');
    return asc ? va - vb : vb - va;
  });

  var maxTotal = 1;
  rows.forEach(function(r){ if(r.total > maxTotal) maxTotal = r.total; });

  var html = '';
  rows.forEach(function(r) {
    var pct = Math.round((r.total / maxTotal) * 100);
    html += '<tr>' +
      '<td>' + r.no + '</td>' +
      '<td style="font-family:var(--head);font-size:.75rem">' + r.name + '</td>' +
      '<td style="font-weight:900;color:var(--r)">' + r.total + '</td>' +
      '<td>' + r.real + '</td>' +
      '<td style="color:var(--y)">' + (r.boost > 0 ? '+' + r.boost : '-') + '</td>' +
      '<td><div class="bar-wrap"><div class="bar" style="width:' + pct + '%"></div></div></td>' +
      '</tr>';
  });

  document.getElementById('rankBody').innerHTML = html || '<tr><td colspan="6" style="text-align:center;color:var(--sub)">まだ投票がありません</td></tr>';

  // th highlight
  document.querySelectorAll('th').forEach(function(t){ t.classList.remove('sorted'); });
  var thId = 'th-' + key;
  var th = document.getElementById(thId);
  if (th) th.classList.add('sorted');
}

function sortTable(key) {
  if (currentSort.key === key) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort.key = key;
    currentSort.asc = key === 'no' || key === 'name';
  }
  renderRanking();
}

/* ── Boost Grid ── */
function renderBoostGrid() {
  if (!artistList) {
    document.getElementById('boostGrid').innerHTML = '<p style="color:var(--sub);font-size:.75rem">アーティストデータを読込中...</p>';
    return;
  }

  var search = (document.getElementById('boostSearch').value || '').toLowerCase();
  var boosts = adminData.boosts || {};
  var html = '';

  artistList.forEach(function(a) {
    if (search && a.name.toLowerCase().indexOf(search) === -1 && a.no.indexOf(search) === -1) return;
    var val = boosts[a.no] || 0;
    html += '<div class="boost-item">' +
      '<span class="boost-no">' + a.no + '</span>' +
      '<span class="boost-name" title="' + a.name + '">' + a.name + '</span>' +
      '<input type="number" class="boost-input' + (val > 0 ? ' has-val' : '') + '" data-no="' + a.no + '" value="' + val + '" min="0" max="9999">' +
      '</div>';
  });

  document.getElementById('boostGrid').innerHTML = html;
}

document.getElementById('boostSearch').addEventListener('input', renderBoostGrid);

function saveAllBoosts() {
  var inputs = document.querySelectorAll('.boost-input');
  var pairs = [];
  inputs.forEach(function(inp) {
    var no = inp.dataset.no;
    var val = parseInt(inp.value) || 0;
    if (val > 0) pairs.push(no + ':' + val);
  });

  // 既存ゲタでグリッドに表示されてないものを除去するため、まず全消しして再設定
  var dataStr = pairs.length > 0 ? pairs.join(',') : '000:0';

  // まず全ゲタをリセット
  apiGet('admin=1&pass=' + PASS + '&action=reset_all_boost', function() {
    // 一括設定
    if (pairs.length > 0) {
      apiGet('admin=1&pass=' + PASS + '&action=boost_bulk&data=' + dataStr, function(data) {
        toast('✅ ゲタを保存しました（' + pairs.length + '件）');
        refreshAll();
      });
    } else {
      // 全てのゲタを0に
      var currentBoosts = adminData.boosts || {};
      var zeroPairs = [];
      for (var k in currentBoosts) zeroPairs.push(k + ':0');
      if (zeroPairs.length > 0) {
        apiGet('admin=1&pass=' + PASS + '&action=boost_bulk&data=' + zeroPairs.join(','), function() {
          toast('✅ ゲタを全て解除しました');
          refreshAll();
        });
      } else {
        toast('✅ 変更なし');
        refreshAll();
      }
    }
  });
}

/* ── Debug Vote ── */
function debugVote() {
  var no = document.getElementById('debugArtist').value.trim();
  if (!no.match(/^\d{1,3}$/)) { toast('No.を入力してください'); return; }
  no = ('000' + no).slice(-3);

  apiGet('action=vote&artist=' + no + '&debug=teihen', function(data) {
    var log = document.getElementById('debugLog');
    var time = new Date().toLocaleTimeString();
    if (data.ok) {
      log.innerHTML += '<span class="ok">[' + time + '] ✅ No.' + no + ' → count:' + data.count + '</span>\n';
    } else {
      log.innerHTML += '<span class="err">[' + time + '] ❌ ' + JSON.stringify(data) + '</span>\n';
    }
    log.scrollTop = log.scrollHeight;
    refreshAll();
  });
}

function debugVote10() {
  var no = document.getElementById('debugArtist').value.trim();
  if (!no.match(/^\d{1,3}$/)) { toast('No.を入力してください'); return; }
  no = ('000' + no).slice(-3);
  for (var i = 0; i < 10; i++) {
    (function(idx) {
      setTimeout(function(){ 
        apiGet('action=vote&artist=' + no + '&debug=teihen', function(data) {
          var log = document.getElementById('debugLog');
          var time = new Date().toLocaleTimeString();
          if (data.ok) {
            log.innerHTML += '<span class="ok">[' + time + '] ✅ No.' + no + ' → count:' + data.count + '</span>\n';
          }
          log.scrollTop = log.scrollHeight;
          if (idx === 9) refreshAll();
        });
      }, idx * 150);
    })(i);
  }
}

/* ── Reset ── */
function resetVotes() {
  if (!confirm('実投票データをリセットしますか？\nゲタは残ります。')) return;
  apiGet('admin=1&pass=' + PASS + '&action=reset', function(data) {
    toast('🗑️ ' + data.message);
    refreshAll();
  });
}

function resetAll() {
  if (!confirm('全データ（実票＋ゲタ）をリセットしますか？\n元に戻せません。')) return;
  if (!confirm('本当にいいですか？')) return;
  apiGet('admin=1&pass=' + PASS + '&action=reset_all', function(data) {
    toast('💣 ' + data.message);
    refreshAll();
  });
}

/* ── CSV ── */
function downloadCSV() {
  window.open(API + '?admin=1&pass=' + PASS + '&format=csv&_=' + Date.now());
}

/* ── Tabs ── */
function showPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

/* ── Toast ── */
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
